<!DOCTYPE html>
<html>
<head>
  <title>Phishing Blocked</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { max-width: 600px; padding: 40px; background: #16213e; border-radius: 16px; text-align: center; }
    .warning-icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #ff5252; margin-bottom: 10px; }
    .details { background: #0f3460; padding: 16px; border-radius: 8px; margin: 20px 0; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
    .detail-label { color: #a0a0a0; }
    .red-flags { margin: 20px 0; }
    .red-flag { background: #d32f2f22; padding: 8px 12px; margin: 4px 0; border-radius: 4px; border-left: 3px solid #d32f2f; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #d32f2f; color: white; }
    .btn-secondary { background: #424242; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="warning-icon">🛡️</div>
    <h1>Phishing Threat Blocked</h1>
    <p>This URL has been identified as a potential phishing threat.</p>
    <div class="details" id="block-details"></div>
    <div class="red-flags" id="red-flags"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="history.back()">Go Back</button>
      <button class="btn btn-primary" id="proceed-btn">Proceed Anyway</button>
    </div>
  </div>
  <script>
    chrome.tabs.query({active: true, currentWindow: true}, (tabs) => {
      const tabId = tabs[0]?.id;
      if (!tabId) return;

      chrome.storage.session.get([`block_${tabId}`], (result) => {
        const data = result[`block_${tabId}`];
        if (!data) return;

        document.getElementById('block-details').innerHTML = `
          <div class="detail-row"><span class="detail-label">URL:</span><span>${data.url || 'Unknown'}</span></div>
          <div class="detail-row"><span class="detail-label">Threat:</span><span>${data.threatLevel || 'Unknown'}</span></div>
          <div class="detail-row"><span class="detail-label">Confidence:</span><span>${((data.confidence || 0) * 100).toFixed(1)}%</span></div>
        `;

        if (data.redFlags && data.redFlags.length > 0) {
          document.getElementById('red-flags').innerHTML = '<h3>Red Flags:</h3>' +
            data.redFlags.map(f => `<div class="red-flag">⚠️ ${f}</div>`).join('');
        }
      });
    });

    document.getElementById('proceed-btn').addEventListener('click', () => {
      chrome.tabs.query({active: true, currentWindow: true}, (tabs) => {
        const tabId = tabs[0]?.id;
        if (tabId) {
          chrome.storage.session.remove(`block_${tabId}`);
        }
      });
      history.back();
    });
  </script>
</body>
</html>
