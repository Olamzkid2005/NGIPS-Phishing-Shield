<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>NGIPS Phishing Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 360px;
      min-height: 480px;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.8;
    }
    .stats-container {
      background: white;
      margin: 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stats-title {
      font-size: 12px;
      font-weight: 600;
      color: #616161;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-box {
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .stat-value.blocked {
      color: #d32f2f;
    }
    .stat-label {
      font-size: 11px;
      color: #757575;
    }
    .toggle-container {
      background: white;
      margin: 0 16px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 500;
      color: #212121;
    }
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ccc;
      border-radius: 26px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .toggle-slider {
      background: #4caf50;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }
    .whitelist-container {
      background: white;
      margin: 0 16px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .whitelist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .whitelist-title {
      font-size: 14px;
      font-weight: 600;
      color: #212121;
    }
    .whitelist-count {
      font-size: 12px;
      color: #757575;
      background: #f5f5f5;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .whitelist-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .whitelist-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
    }
    .whitelist-input:focus {
      outline: none;
      border-color: #1a1a2e;
    }
    .add-btn {
      padding: 10px 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .add-btn:hover {
      background: #2d2d4a;
    }
    .whitelist-list {
      max-height: 120px;
      overflow-y: auto;
    }
    .whitelist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid #f5f5f5;
    }
    .whitelist-item:last-child {
      border-bottom: none;
    }
    .whitelist-domain {
      font-size: 13px;
      color: #424242;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #9e9e9e;
      cursor: pointer;
      font-size: 18px;
    }
    .remove-btn:hover {
      color: #d32f2f;
    }
    .empty-state {
      text-align: center;
      padding: 24px;
      color: #9e9e9e;
      font-size: 13px;
    }
    .threat-status-container {
      background: white;
      margin: 0 16px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .threat-status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .threat-status-title {
      font-size: 14px;
      font-weight: 600;
      color: #212121;
    }
    .threat-status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      color: white;
      text-transform: uppercase;
    }
    .threat-status-badge.safe {
      background: #4caf50;
    }
    .threat-status-badge.low {
      background: #4caf50;
    }
    .threat-status-badge.medium {
      background: #ff9800;
    }
    .threat-status-badge.high {
      background: #f44336;
    }
    .threat-status-badge.critical {
      background: #d32f2f;
    }
    .threat-details {
      margin-bottom: 12px;
    }
    .safe-state {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4caf50;
      font-size: 14px;
    }
    .safe-icon {
      font-size: 18px;
      font-weight: 700;
    }
    .threat-warning {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d32f2f;
      font-size: 14px;
      font-weight: 500;
    }
    .warning-icon {
      font-size: 18px;
    }
    .red-flags-mini {
      margin-top: 8px;
      padding-left: 26px;
    }
    .mini-flag {
      font-size: 12px;
      color: #616161;
      padding: 3px 0;
      border-left: 2px solid #ff9800;
      padding-left: 8px;
      margin-bottom: 4px;
    }
    .scan-btn {
      width: 100%;
      padding: 10px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .scan-btn:hover {
      background: #2d2d4a;
    }
    .scan-btn:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .ml-status-container {
      background: white;
      margin: 0 16px 16px;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .ml-status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ml-status-title {
      font-size: 13px;
      font-weight: 500;
      color: #616161;
    }
    .ml-status-indicator {
      font-size: 12px;
      font-weight: 600;
      color: #4caf50;
    }
    .ml-status-indicator.inactive {
      color: #9e9e9e;
    }
    .ml-status-indicator.error {
      color: #d32f2f;
    }
    .ml-status-indicator.warning {
      color: #ff9800;
    }
    .ml-status-indicator.active {
      color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>NGIPS Phishing Shield</h1>
    <p>Real-time protection active</p>
  </div>

  <div class="stats-container">
    <div class="stats-title">Protection Statistics</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="total-checked">0</div>
        <div class="stat-label">Checked</div>
      </div>
      <div class="stat-box">
        <div class="stat-value blocked" id="blocked-count">0</div>
        <div class="stat-label">Blocked</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="allowed-count">0</div>
        <div class="stat-label">Allowed</div>
      </div>
    </div>
  </div>

  <div class="threat-status-container">
    <div class="threat-status-header">
      <span class="threat-status-title">Current Page</span>
      <span class="threat-status-badge" id="threat-badge">Safe</span>
    </div>
    <div class="threat-details" id="threat-details">
      <div class="safe-state">
        <span class="safe-icon">✓</span>
        <span>No threats detected</span>
      </div>
    </div>
    <button class="scan-btn" id="scan-btn">Scan Current Page</button>
  </div>

  <div class="ml-status-container">
    <div class="ml-status-header">
      <span class="ml-status-title">ML Model Status</span>
      <span class="ml-status-indicator" id="ml-status">Active</span>
    </div>
  </div>

  <div class="toggle-container">
    <div class="toggle-row">
      <span class="toggle-label">Protection Enabled</span>
      <label class="toggle-switch">
        <input type="checkbox" id="enable-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="whitelist-container">
    <div class="whitelist-header">
      <span class="whitelist-title">Whitelist</span>
      <span class="whitelist-count" id="whitelist-count">0 domains</span>
    </div>
    <div class="whitelist-input-row">
      <input type="text" class="whitelist-input" id="whitelist-input" placeholder="Add domain (e.g., example.com)">
      <button class="add-btn" id="add-whitelist-btn">Add</button>
    </div>
    <div class="whitelist-list" id="whitelist-list">
      <div class="empty-state">No whitelisted domains</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
