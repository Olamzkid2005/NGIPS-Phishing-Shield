<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' https://cdn.tailwindcss.com; img-src 'self' data:;">
    <title>NGIPS Phishing Shield</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#fbf8ff",
                        "on-surface": "#191b25",
                        "on-surface-variant": "#434656",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "primary": "#003ec7",
                        "primary-container": "#0052ff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#dfe3ff",
                        "secondary-container": "#d0e1fb",
                        "on-secondary-container": "#54647a",
                        "surface-container": "#ededfb",
                        "surface-container-low": "#f3f2ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e7e7f5",
                        "surface-container-highest": "#e1e1ef",
                        "outline": "#737688",
                        "outline-variant": "#c3c5d9",
                    },
                    fontFamily: {
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    fontSize: {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
    <style>
        body { width: 360px; min-height: 480px; overflow-x: hidden; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .status-strip-safe { border-left: 4px solid #22c55e; }
        .status-strip-warning { border-left: 4px solid #ff9800; }
        .status-strip-danger { border-left: 4px solid #ba1a1a; }
    </style>
</head>
<body class="bg-surface-bright font-body-md text-on-surface">
    <!-- Header -->
    <header class="bg-primary-container text-on-primary-container px-4 py-4 sticky top-0 z-50 shadow-sm flex flex-col gap-1 overflow-hidden relative">
        <div class="absolute inset-0 bg-gradient-to-br from-primary-container via-primary to-primary-container opacity-90"></div>
        <div class="relative z-10 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-white">shield</span>
                <span class="font-headline-md text-white tracking-tight text-[18px]">NGIPS Phishing Shield</span>
            </div>
            <div class="flex gap-2">
                <span class="material-symbols-outlined text-white/80 cursor-pointer hover:text-white" data-icon="settings">settings</span>
            </div>
        </div>
        <div class="relative z-10 flex items-center gap-2 mt-1">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
            <span id="status-text" class="text-white/90 text-[12px] font-label-md">Real-time protection active</span>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <!-- Stats Card -->
        <section class="grid grid-cols-3 gap-2 bg-white rounded-xl p-3 shadow-sm border border-outline-variant">
            <div class="flex flex-col items-center border-r border-outline-variant/30">
                <span class="text-on-surface-variant font-label-md">Checked</span>
                <span id="total-checked" class="font-headline-md text-[16px]">0</span>
            </div>
            <div class="flex flex-col items-center border-r border-outline-variant/30">
                <span class="text-on-surface-variant font-label-md">Blocked</span>
                <span id="blocked-count" class="font-headline-md text-[16px] text-error font-extrabold">0</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-on-surface-variant font-label-md">Allowed</span>
                <span id="allowed-count" class="font-headline-md text-[16px]">0</span>
            </div>
        </section>

        <!-- Current Page Card -->
        <div id="threat-card" class="bg-white rounded-xl shadow-sm border border-outline-variant overflow-hidden status-strip-safe">
            <div class="p-4 space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-on-surface-variant font-label-lg">Current Page</span>
                    <span id="threat-badge" class="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-[10px] font-bold tracking-wider">SAFE</span>
                </div>
                <div id="threat-details" class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-green-500 text-[32px]">check_circle</span>
                    <p class="text-on-surface font-medium">No threats detected</p>
                </div>
                <button id="scan-btn" class="w-full bg-primary py-2.5 rounded-lg text-white font-label-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <span class="material-symbols-outlined text-[18px]">search</span>
                    Scan Current Page
                </button>
            </div>
        </div>

        <!-- ML Model & Protection Toggle -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-surface-container rounded-xl p-3 flex flex-col justify-between border border-outline-variant/20">
                <span class="text-on-surface-variant font-label-md">ML Model</span>
                <div class="flex items-center gap-2 mt-1">
                    <div id="ml-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="ml-status" class="text-on-surface font-semibold text-sm">Active</span>
                </div>
            </div>
            <div class="bg-surface-container rounded-xl p-3 flex flex-col justify-between border border-outline-variant/20">
                <span class="text-on-surface-variant font-label-md">Protection</span>
                <div class="flex items-center gap-2 mt-1">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="enable-toggle" checked class="sr-only peer">
                        <div class="w-8 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                    <span id="protection-text" class="text-on-surface font-semibold text-sm">ON</span>
                </div>
            </div>
        </div>

        <!-- Whitelist Section -->
        <section class="bg-white rounded-xl p-4 shadow-sm border border-outline-variant space-y-3">
            <div class="flex items-center justify-between">
                <h3 class="font-label-lg text-on-surface">Whitelist (<span id="whitelist-count">0</span>)</h3>
                <span class="material-symbols-outlined text-on-surface-variant text-[18px]">verified_user</span>
            </div>
            <div id="whitelist-list" class="space-y-2 max-h-[120px] overflow-y-auto">
                <div class="empty-state text-center py-4 text-slate-400 text-sm">No whitelisted domains</div>
            </div>
            <div class="flex gap-2 pt-1">
                <input id="whitelist-input" class="flex-grow bg-surface-container-highest border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none" placeholder="Add domain..." type="text"/>
                <button id="add-whitelist-btn" class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-lg font-label-lg active:opacity-80">Add</button>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white/80 backdrop-blur-md border-t border-outline-variant">
        <button class="flex flex-col items-center justify-center text-primary-container bg-blue-50/50 py-2 w-full">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield</span>
            <span class="font-['Inter'] text-[11px] uppercase tracking-wider font-bold">Protection</span>
        </button>
        <button class="flex flex-col items-center justify-center text-slate-400 py-2 w-full hover:text-blue-500 transition-colors">
            <span class="material-symbols-outlined">verified_user</span>
            <span class="font-['Inter'] text-[11px] uppercase tracking-wider font-bold">Whitelist</span>
        </button>
        <button class="flex flex-col items-center justify-center text-slate-400 py-2 w-full hover:text-blue-500 transition-colors">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-['Inter'] text-[11px] uppercase tracking-wider font-bold">Settings</span>
        </button>
    </nav>

    <script src="popup.js"></script>
</body>
</html>
